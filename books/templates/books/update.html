{% extends 'books/base.html' %}

{% block title %}
Update Book
{% endblock %}

{% block content %}
    <section class="page-hero">
        <span class="badge-soft mb-3">Edit Entry</span>
        <h1 class="section-title">Update Book</h1>
        <p class="section-subtitle">Adjust the current book details using the same backend form and validation already wired in the project.</p>
    </section>

    <div class="row justify-content-center">
        <div class="col-lg-8">
            <div class="surface-card p-4 p-md-5">
                <form method="POST" enctype="multipart/form-data">
                    {% csrf_token %}
                    {{ form.as_p }}

                    <div class="d-flex flex-wrap gap-2 mt-4">
                        <button type="submit" class="btn btn-brand">Update</button>
                        <a href="{% url 'books:show' book.id %}" class="btn btn-outline-secondary">Back</a>
                    </div>
                </form>
            </div>
        </div>
    </div>
{% endblock %}

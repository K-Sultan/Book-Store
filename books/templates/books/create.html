{% extends 'books/base.html' %}

{% block title %}
Create Book
{% endblock %}

{% block content %}
    <h1>Create Book</h1>

    <form method="POST" enctype="multipart/form-data">
        {% csrf_token %}
        {{ form.as_p }}

        <button type="submit">Save</button>
    </form>

    <br>

    <a href="{% url 'books:index' %}">Back</a>
{% endblock %}

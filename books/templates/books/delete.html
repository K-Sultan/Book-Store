{% extends 'books/base.html' %}

{% block title %}
Delete Book
{% endblock %}

{% block content %}
    <h1>Delete Book</h1>

    <p>Are you sure you want to delete: <strong>{{ book.title }}</strong>?</p>

    <form method="POST">
        {% csrf_token %}
        <button type="submit">Yes, Delete</button>
    </form>

    <br>

    <a href="{% url 'books:show' book.id %}">Cancel</a>
{% endblock %}
